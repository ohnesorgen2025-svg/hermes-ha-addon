name: Hermes Agent
version: "0.1.0"
slug: hermes_agent
description: "The self-improving AI agent built by Nous Research. Slim fork for Raspberry Pi — Ollama Cloud + Telegram."
url: "https://github.com/WolframRavenwolf/hermes-ha-addon"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
homeassistant_api: true
map:
  - addon_config:rw
  - media:rw
  - share:rw
ports:
  8443/tcp: null
ports_description:
  8443/tcp: "Hermes Gateway API (optional)"
options:
  ollama_api_key: ""
  ollama_model: "hermes3:latest"
  telegram_bot_token: ""
  access_password: ""
  auto_update: false
schema:
  ollama_api_key: "str"
  ollama_model: "str"
  telegram_bot_token: "str"
  access_password: "str"
  auto_update: "bool"
