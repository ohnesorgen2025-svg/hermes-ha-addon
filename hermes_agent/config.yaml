name: Hermes Agent
version: "0.2.9"
slug: hermes_agent
description: "The self-improving AI agent built by Nous Research. Slim fork for Raspberry Pi — Ollama Cloud + Telegram."
url: "https://github.com/ohnesorgen2025-svg/hermes-ha-addon"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
homeassistant_api: true
map:
  - addon_config:rw
  - media:rw
  - share:rw
ports:
  8443/tcp: null
ports_description:
  8443/tcp: "Hermes Gateway API (optional)"
options:
  ollama_api_key: ""
  ollama_model: "hermes3:latest"
  telegram_bot_token: ""
  telegram_allowed_users: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  access_password: ""
  auto_update: false
schema:
  ollama_api_key: "str"
  ollama_model: "str"
  telegram_bot_token: "str"
  telegram_allowed_users: "str"
  mqtt_host: "str"
  mqtt_port: "int"
  mqtt_user: "str"
  mqtt_password: "password"
  access_password: "str"
  auto_update: "bool"
