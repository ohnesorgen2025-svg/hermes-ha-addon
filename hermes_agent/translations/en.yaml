configuration:
  ollama_api_key:
    name: Ollama API Key
    description: Ollama Cloud API key used by Hermes Agent.
  ollama_model:
    name: Ollama Model
    description: Ollama Cloud model name.
  telegram_bot_token:
    name: Telegram Bot Token
    description: Telegram bot token used by Hermes Agent.
  access_password:
    name: Access Password
    description: Optional Hermes Gateway API key for external clients.
  auto_update:
    name: Auto Update
    description: >-
      Pull latest changes from git on every restart.
